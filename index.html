<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=yes">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>挪车电话</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f0f4f8;
    color: #333;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 20px;
    text-align: center;
  }
  .icon {
    font-size: 64px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    line-height: 1.6;
    color: #1a1a1a;
    margin-bottom: 12px;
    max-width: 320px;
  }
  h2 {
    font-size: 17px;
    font-weight: 400;
    line-height: 1.5;
    color: #666;
    margin-bottom: 40px;
  }
  .call-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 260px;
    height: 56px;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #4CAF50, #45a049);
    border: none;
    border-radius: 28px;
    text-decoration: none;
    box-shadow: 0 4px 14px rgba(76, 175, 80, 0.4);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s;
  }
  .call-btn:active {
    transform: scale(0.96);
  }
  .call-btn svg {
    width: 24px;
    height: 24px;
    fill: #fff;
  }
  .footer {
    margin-top: 48px;
    font-size: 13px;
    color: #aaa;
  }
  .copyright {
    margin-top: 16px;
    font-size: 12px;
    color: #ccc;
  }
</style>
</head>
<body>
<div class="container">
  <div class="icon">🚗</div>
  <h1>临时停靠，给您添麻烦了</h1>
  <h2>点击下方立刻 Call 我挪车</h2>
  <a class="call-btn" id="callBtn" href="#">
    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24 11.36 11.36 0 0 0 3.58.57 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11.36 11.36 0 0 0 .57 3.58 1 1 0 0 1-.24 1.01l-2.2 2.2z"/></svg>
    立刻拨打
  </a>
  <div class="footer">感谢您的理解与配合</div>
  <div class="copyright" id="copyright"></div>
</div>
<script>
  !function(){
    var p=[49,51,49,52,56,52,57,55,54,49,53];
    var n=p.map(function(c){return String.fromCharCode(c)}).join('');
    document.getElementById('callBtn').href='t'+'e'+'l'+':'+n;
    var s=2026,c=new Date().getFullYear(),y=c>s?s+'-'+c:String(s);
    document.getElementById('copyright').textContent='\u00A9 '+y+' Shen Lin. All rights reserved.';
  }();
</script>
</body>
</html>
